name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag
        default: latest
        required: false
      dry_run:
        description: Only simulate publish
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set @nodomx:registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Verify release payload
        run: npm run release:check

      - name: Package VSCode extension artifact
        run: npm run package:extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodomx-extension-release
          path: vscode-extension/*.vsix

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          INPUT_NPM_TAG: ${{ github.event.inputs.npm_tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN is not configured, skipping npm publish."
            exit 0
          fi
          npm config set registry https://registry.npmjs.org/
          npm config set @nodomx:registry https://registry.npmjs.org/
          TAG="${INPUT_NPM_TAG:-latest}"
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            npm run release:publish -- --dry-run --tag "$TAG"
          else
            npm run release:publish -- --tag "$TAG"
          fi

      - name: Publish VSCode extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            echo "Dry run enabled, skipping VSCode Marketplace publish."
            exit 0
          fi
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT is not configured, skipping VSCode Marketplace publish."
            exit 0
          fi
          npm run publish:extension
